<!-- ══════════════════════════════════════════════════════
  well-empty.svg — Level 0: Empty Lot
  A dashed-border square with a cross inside.
  The stroke-dasharray signals "available to build here".
  Colours: all gray (#CBCCD1) — nothing active yet.
  ViewBox: 0 0 56 56 (rendered at 64×64 in-game, 32×32 in legend)
══════════════════════════════════════════════════════ -->
<svg xmlns="http://www.w3.org/2000/svg"
     width="64" height="64" viewBox="0 0 56 56" fill="none">

  <!-- Dashed border rectangle — rounded corners, 6px dash / 3px gap -->
  <rect x="2" y="2" width="52" height="52" rx="4"
    stroke="#CBCCD1" stroke-width="1.5" stroke-dasharray="6 3"/>

  <!-- Vertical bar of the + -->
  <line x1="28" y1="14" x2="28" y2="42"
    stroke="#CBCCD1" stroke-width="2" stroke-linecap="round"/>

  <!-- Horizontal bar of the + -->
  <line x1="14" y1="28" x2="42" y2="28"
    stroke="#CBCCD1" stroke-width="2" stroke-linecap="round"/>

</svg>
