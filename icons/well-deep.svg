<!-- ══════════════════════════════════════════════════════
  well-deep.svg — Level 3: Deep Well with Windmill
  A tall tower structure with four windmill blades at the top.
  Colours:
    #BF6C46 (terra)  — tower legs, struts, base
    #003366 (navy)   — hub circle, central pole outline
    #FFC907 (yellow) — top and bottom blades
    #77A8BB (steel)  — left and right blades, ground shadow
    #CBCCD1 (gray)   — central pole fill
  Alternating blade colours give a visual rotation impression.
  ViewBox: 0 0 56 56
══════════════════════════════════════════════════════ -->
<svg xmlns="http://www.w3.org/2000/svg"
     width="64" height="64" viewBox="0 0 56 56" fill="none">

  <!-- Left tower leg — diagonal from base up to hub -->
  <line x1="20" y1="54" x2="28" y2="18"
    stroke="#BF6C46" stroke-width="2.5"/>

  <!-- Right tower leg — mirrors the left -->
  <line x1="36" y1="54" x2="28" y2="18"
    stroke="#BF6C46" stroke-width="2.5"/>

  <!-- Base horizontal strut at ground level -->
  <line x1="18" y1="54" x2="38" y2="54"
    stroke="#BF6C46" stroke-width="2.5"/>

  <!-- Upper horizontal cross-brace -->
  <line x1="21" y1="44" x2="35" y2="44"
    stroke="#BF6C46" stroke-width="2"/>

  <!-- Lower horizontal cross-brace -->
  <line x1="23" y1="34" x2="33" y2="34"
    stroke="#BF6C46" stroke-width="2"/>

  <!-- Hub circle where all four blades meet -->
  <circle cx="28" cy="16" r="3.5" fill="#003366"/>

  <!-- Blade: top (yellow) -->
  <line x1="28" y1="6"  x2="28" y2="16"
    stroke="#FFC907" stroke-width="3.5" stroke-linecap="round"/>

  <!-- Blade: right (steel blue) -->
  <line x1="28" y1="16" x2="38" y2="16"
    stroke="#77A8BB" stroke-width="3.5" stroke-linecap="round"/>

  <!-- Blade: bottom (yellow) -->
  <line x1="28" y1="16" x2="28" y2="26"
    stroke="#FFC907" stroke-width="3.5" stroke-linecap="round"/>

  <!-- Blade: left (steel blue) -->
  <line x1="28" y1="16" x2="18" y2="16"
    stroke="#77A8BB" stroke-width="3.5" stroke-linecap="round"/>

  <!-- Central support pole from hub down to base -->
  <rect x="26" y="18" width="4" height="36"
    fill="#CBCCD1" stroke="#003366" stroke-width="1"/>

  <!-- Ground shadow ellipse — semi-transparent, adds depth -->
  <ellipse cx="28" cy="54" rx="14" ry="3.5"
    fill="#77A8BB" opacity="0.5"/>

</svg>
