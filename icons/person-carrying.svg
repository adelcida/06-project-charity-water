<!-- ══════════════════════════════════════════════════════
  person-carrying.svg — Delivery person, holding water
  Right arm raised, mini jerry can visible in raised hand.
  Used in the Delivery panel when waterCarried > 0.
  Colours:
    #FED8C1 (peach)  — head, arms, skin
    #003366 (navy)   — eyes, body/shirt, legs, outlines
    #1A1A1A (black)  — feet/shoes
    #FFC907 (yellow) — mini jerry can body
    white            — mini jerry can X crossbrace
  ViewBox: 0 0 72 110
══════════════════════════════════════════════════════ -->
<svg xmlns="http://www.w3.org/2000/svg"
     width="72" height="110" viewBox="0 0 72 110" fill="none">

  <!-- Head -->
  <circle cx="36" cy="18" r="14"
    fill="#FED8C1" stroke="#003366" stroke-width="1.5"/>

  <!-- Left eye -->
  <circle cx="31" cy="16" r="2" fill="#003366"/>

  <!-- Right eye -->
  <circle cx="41" cy="16" r="2" fill="#003366"/>

  <!-- Smile -->
  <path d="M31 23 Q36 28 41 23"
    stroke="#003366" stroke-width="1.5" stroke-linecap="round" fill="none"/>

  <!-- Body / navy shirt -->
  <rect x="26" y="32" width="20" height="28" rx="6"
    fill="#003366" stroke="#003366" stroke-width="1"/>

  <!-- Left arm — lowered -->
  <rect x="12" y="34" width="14" height="7" rx="3.5"
    fill="#FED8C1" stroke="#003366" stroke-width="1"/>

  <!-- Right arm — RAISED (y=26 instead of 34) -->
  <rect x="46" y="26" width="14" height="7" rx="3.5"
    fill="#FED8C1" stroke="#003366" stroke-width="1"/>

  <!-- Mini jerry can body — held above the raised arm -->
  <rect x="59" y="14" width="11" height="18" rx="2.5"
    fill="#FFC907" stroke="#003366" stroke-width="1.5"/>

  <!-- Mini X crossbrace — left diagonal -->
  <line x1="62" y1="18" x2="67" y2="26"
    stroke="white" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Mini X crossbrace — right diagonal -->
  <line x1="67" y1="18" x2="62" y2="26"
    stroke="white" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Left leg -->
  <rect x="27" y="58" width="8" height="26" rx="4" fill="#003366"/>

  <!-- Right leg -->
  <rect x="37" y="58" width="8" height="26" rx="4" fill="#003366"/>

  <!-- Left shoe -->
  <ellipse cx="31" cy="84" rx="9" ry="4" fill="#1A1A1A"/>

  <!-- Right shoe -->
  <ellipse cx="41" cy="84" rx="9" ry="4" fill="#1A1A1A"/>

</svg>
